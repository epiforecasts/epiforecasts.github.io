description: > 
  Josh is a Research Fellow evaluating how targeted individual-level
  interventions (e.g., contact tracing) can be effectively deployed to control
  emerging outbreak scenarios. He is also keen to develop open-source
  modelling and data analysis tooling that can be used by the epidemiology
  research community.
