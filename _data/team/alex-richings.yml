name: Alex Richings
github: alexrichings
position:
  - type: PhD
    start: 2025-09-23
description: >
  Alex is a PhD student whose work focuses on using serological and climatic
  data to address susceptibility of small islands to vector-borne disease
  outbreaks. He is interested in developing statistical forecasts with the aim
  of applying this work to island settings to support the development of early
  warning systems.
